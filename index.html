<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RTC Project - Fixed AR</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <style>
        /* 画面全体をAR領域にするための必須設定 */
        body { margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        
        /* 1. スキャン画面をフルスクリーンにする */
        .mindar-ui-overlay { z-index: 500; }
        video { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; object-fit: cover !important; }

        /* 2. 点滅演出レイヤー */
        #flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; opacity: 0; z-index: 9999; pointer-events: none;
        }
        .run-flash { animation: flashAnimation 0.5s ease-out; }
        @keyframes flashAnimation { 0% { opacity: 0; } 10% { opacity: 1; } 100% { opacity: 0; } }

        /* 3. UI：初期は非表示（display: none） */
        #ui-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: none; /* ← ここで最初は隠す */
        }
        button { 
            padding: 15px 30px; font-size: 18px; border-radius: 30px; border: none;
            background: rgba(255,255,255,0.8); color: #333; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="flash-overlay"></div>

    <div id="ui-container">
        <button id="capture-btn">📷 撮影モード</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.1; uiLoading: no; uiError: no; uiScanning: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="nicole-img" src="./nicole.png">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="nicole-target" mindar-image-target="targetIndex: 0">
            <a-image 
                id="nicole-asset"
                src="#nicole-img" 
                width="6.0" 
                height="8.0" 
                position="0 0 0"
                look-at="[camera]"
                visible="false">
            </a-image>
        </a-entity>
    </a-scene>

    <script>
        const targetEl = document.querySelector('#nicole-target');
        const flashOverlay = document.querySelector('#flash-overlay');
        const nicoleAsset = document.querySelector('#nicole-asset');
        const uiContainer = document.querySelector('#ui-container');

        // ターゲット検知時
        targetEl.addEventListener("mindar-image-target-found", (event) => {
            // 点滅演出
            flashOverlay.classList.remove('run-flash');
            void flashOverlay.offsetWidth; 
            flashOverlay.classList.add('run-flash');

            // 0.1秒後にニコルを表示し、UI（ボタン）も出す
            setTimeout(() => {
                nicoleAsset.setAttribute('visible', 'true');
                uiContainer.style.display = 'flex'; // ボタンを表示
            }, 100);
        });

        // ターゲットを見失った時
        targetEl.addEventListener("mindar-image-target-lost", (event) => {
            nicoleAsset.setAttribute('visible', 'false');
            uiContainer.style.display = 'none'; // ボタンを隠す
        });

        // 撮影ボタン（サマリーにあった window オブジェクト登録）
        window.captureMode = function() {
            uiContainer.style.display = 'none';
            // ここに撮影用ロジック
        };
        document.getElementById('capture-btn').onclick = window.captureMode;
    </script>
</body>
</html>
