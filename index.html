<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RTC Project - Final Fix</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <style>
        /* 1. 画面の寄り・バグを力技で直すCSS */
        body { margin: 0; overflow: hidden; position: fixed; width: 100vw; height: 100vh; background: #000; }
        
        /* Mind-ARのビデオが勝手に左に寄らないように固定 */
        video, canvas {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        /* 2. ブラウザが出してくる「再生ボタン」類を非表示 */
        .mindar-ui-overlay, .mindar-ui-scanning, .mindar-ui-loading {
            display: none !important;
        }

        /* 3. 最初の「開始ボタン」：これが一番重要 */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; color: white; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #start-btn {
            padding: 20px 40px; font-size: 20px; background: #c0a060; /* 和風な金 */
            color: white; border: none; border-radius: 5px; cursor: pointer;
        }

        /* 4. 点滅演出 */
        #flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; opacity: 0; z-index: 9999; pointer-events: none;
        }
        .run-flash { animation: flashAnimation 0.5s ease-out; }
        @keyframes flashAnimation { 0% { opacity: 0; } 10% { opacity: 1; } 100% { opacity: 0; } }

        /* 5. 撮影用UI */
        #ui-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: none;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="margin-bottom:20px;">RTC AR System</h1>
        <button id="start-btn">AR体験を開始する</button>
    </div>

    <div id="flash-overlay"></div>

    <div id="ui-container">
        <button id="capture-btn" style="padding:15px 30px; border-radius:30px; border:none; background:white;">📷 撮影モード</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.1;" 
        embedded color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="nicole-img" src="./nicole.png">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="nicole-target" mindar-image-target="targetIndex: 0">
            <a-image 
                id="nicole-asset"
                src="#nicole-img" 
                width="6.0" 
                height="8.0" 
                look-at="[camera]"
                visible="false">
            </a-image>
        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('a-scene');
const startScreen = document.querySelector('#start-screen');
const startBtn = document.querySelector('#start-btn');

// --- 追加: ターゲット認識時に必要な要素 ---
const targetEl = document.querySelector('#nicole-target');
const nicoleAsset = document.querySelector('#nicole-asset');
const uiContainer = document.querySelector('#ui-container');
const flashOverlay = document.querySelector('#flash-overlay');

// 1. シーンが「完全にロード」されるのを待つ
sceneEl.addEventListener("loaded", () => {
    console.log("A-Frame Scene Loaded");

    // 2. 開始ボタンが押された時の処理
    startBtn.addEventListener('click', () => {
        // A-Frameのシステム経由でMind-ARを強制起動
        const arSystem = sceneEl.systems['mindar-image-system'];
        
        if (arSystem) {
            arSystem.start(); // ここでスキャン開始
            console.log("Mind-AR System Started");
        }

        startScreen.style.display = 'none';
    });
});

// --- ターゲット検知演出（ここはそのまま） ---
targetEl.addEventListener("mindar-image-target-found", () => {
    flashOverlay.classList.remove('run-flash');
    void flashOverlay.offsetWidth; 
    flashOverlay.classList.add('run-flash');

    setTimeout(() => {
        nicoleAsset.setAttribute('visible', 'true');
        uiContainer.style.display = 'flex';
    }, 100);
});

targetEl.addEventListener("mindar-image-target-lost", () => {
    nicoleAsset.setAttribute('visible', 'false');
    uiContainer.style.display = 'none';
});
    </script>
</body>
</html>
