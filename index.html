<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2.5D AR Nicole - Double Flash</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; background: #000; }
        
        /* 1. 開始ボタン：z-indexを一番大きくして確実にクリック可能にする */
        #start-button {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10000; /* 最前面 */
            padding: 18px 36px; background: linear-gradient(135deg, #28a745, #218838);
            color: white; border: none; border-radius: 50px; font-family: sans-serif;
            font-size: 18px; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        /* 2. 点滅演出用のレイヤー */
        #flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; opacity: 0; 
            z-index: 9998; /* ボタンよりは下、ARシーンよりは上 */
            pointer-events: none; /* これが重要：下のクリックを邪魔しない */
        }

        /* 3. 点滅アニメーション：2回光る設定 */
        .run-flash {
            animation: flashAnimation 0.8s ease-out;
        }
        @keyframes flashAnimation {
            0%   { opacity: 0; }
            15%  { opacity: 1; }  /* 1回目：パッ */
            30%  { opacity: 0; }
            45%  { opacity: 1; }  /* 2回目：パッ */
            100% { opacity: 0; }  /* 消える */
        }
    </style>
</head>
<body>
    <div id="flash-overlay"></div>

    <button id="start-button" onclick="startAR()">ARを開始する</button>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes;" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true, precision: medium">
        
        <a-assets>
            <img id="nicole-img" src="./ニコル.png">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="t" mindar-image-target="targetIndex: 0">
            <a-image id="ar-image" src="#nicole-img" 
                width="1" height="1" 
                position="0 0.2 0.1" 
                rotation="45 0 0" 
                visible="false"></a-image>
        </a-entity>
    </a-scene>

    <script>
        const arImageObj = document.querySelector("#ar-image");
        const startBtn = document.querySelector("#start-button");
        const flashOverlay = document.querySelector("#flash-overlay");
        const targetEl = document.querySelector('#t');

        function startAR() {
            console.log("Button clicked!"); // 動作確認用
            const sceneEl = document.querySelector('a-scene');
            const arSystem = sceneEl.systems["mindar-image-system"];
            
            if (arSystem) {
                startBtn.style.display = "none";
                arSystem.start(); 
            } else {
                console.error("AR System not found");
            }
        }

        // 2回点滅後に画像を表示
        targetEl.addEventListener("targetFound", () => {
            console.log("Target Found!");
            
            // アニメーションをリセットして実行
            flashOverlay.classList.remove('run-flash');
            void flashOverlay.offsetWidth; 
            flashOverlay.classList.add('run-flash');

            // 0.45秒後（2回目のフラッシュが光った直後）に画像を表示
            setTimeout(() => {
                arImageObj.setAttribute("visible", "true");
            }, 450); 
        });

        targetEl.addEventListener("targetLost", () => {
            arImageObj.setAttribute("visible", "false");
        });
    </script>
</body>
</html>
